<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>H168</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:gold;
  text-align:center;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center, rgba(255,140,0,0.3), black 70%);
  animation: fireMove 5s infinite alternate;
  z-index:-1;
}

@keyframes fireMove{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

.logo{
  width:320px;
  max-width:90%;
  margin-top:20px;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{filter:drop-shadow(0 0 10px gold);}
  to{filter:drop-shadow(0 0 35px orange);}
}

.subtitle{
  font-size:20px;
  margin-bottom:30px;
  text-shadow:0 0 10px gold;
}

.card{
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  border:1px solid gold;
  margin:15px auto;
  padding:15px;
  width:300px;
  border-radius:15px;
  box-shadow:0 0 15px rgba(255,215,0,0.4);
}

input{
  padding:10px;
  margin:6px;
  border-radius:5px;
  border:none;
  width:200px;
}

button{
  padding:8px 15px;
  margin:5px;
  background:linear-gradient(to right,gold,orange);
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  transform:scale(1.05);
}

.admin-btn{
  background:red;
  color:white;
}

.coin{
  position:fixed;
  top:-50px;
  width:25px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<img src="logo.png" class="logo">
<div class="subtitle">Luôn Đồng Hành Cùng Bạn</div>

<div id="loginPage">
  <div class="card">
    <input id="username" placeholder="Tài khoản"><br>
    <input id="password" type="password" placeholder="Mật khẩu"><br>
    <button onclick="login()">Đăng nhập</button>
    <p id="message"></p>
  </div>
</div>

<div id="dashboard" style="display:none;">
  <h2>🎲 DỰ ĐOÁN LỚN BÉ 🎲</h2>

  <div class="card">
    <p>Số dư: <span id="score">0</span></p>
    <p>Thời gian: <span id="time">45</span>s</p>

    <div style="font-size:60px;margin:15px;">
      <span id="dice1">🎲</span>
      <span id="dice2">🎲</span>
      <span id="dice3">🎲</span>
    </div>

    <button onclick="selectChoice('big')">Chọn LỚN (11-18)</button>
    <button onclick="selectChoice('small')">Chọn BÉ (3-10)</button>

    <p id="result"></p>
  </div>

  <button onclick="logout()">Đăng xuất</button>
</div>

<div id="adminPage" style="display:none;">
  <h2>👑 ADMIN PANEL</h2>
  <div id="userList"></div>
  <button onclick="logout()">Đăng xuất</button>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users"));

if(!users){
  users = [
    {username:"admin", password:"123456", approved:true, role:"admin"},
    {username:"user1", password:"111111", approved:true, role:"user", balance:1000}
  ];
  saveUsers();
}

function saveUsers(){
  localStorage.setItem("users", JSON.stringify(users));
}

let currentUser = null;

function login(){
  let u=username.value;
  let p=password.value;
  let user=users.find(x=>x.username===u && x.password===p);

  if(!user){
    message.innerHTML="Sai tài khoản!";
    return;
  }

  currentUser = user;
  loginPage.style.display="none";

  if(user.role==="admin"){
    adminPage.style.display="block";
    renderUsers();
  }else{
    dashboard.style.display="block";
    if(!currentUser.balance) currentUser.balance=0;
    score.innerText=currentUser.balance;
    updateSessionDisplay();
  }
}

let forcedResult="random";
let sessionCode=Math.floor(100000 + Math.random()*900000);

function logout(){
  location.reload();
}

let timeLeft=45;
let selectedChoice=null;
let betAmount=0;
let isWaiting=false;

function startTimer(){
  const timer=setInterval(()=>{
    timeLeft--;
    time.innerText=timeLeft;

    if(timeLeft<=0){
      clearInterval(timer);
      rollDice();
    }
  },1000);
}

function rollDice(){
  let d1=Math.floor(Math.random()*6)+1;
  let d2=Math.floor(Math.random()*6)+1;
  let d3=Math.floor(Math.random()*6)+1;
  let total=d1+d2+d3;

  dice1.innerText=d1;
  dice2.innerText=d2;
  dice3.innerText=d3;

  setTimeout(()=>location.reload(),5000);
}

startTimer();
</script>

</body>
</html>
